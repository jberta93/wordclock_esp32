# arduino-cli sketch profile — build riproducibile e con dipendenze versionate.
# Uso:
#   arduino-cli compile --profile esp32 .
#   arduino-cli upload  --profile esp32 -p /dev/ttyUSB0 .
#
# Le versioni qui sotto sono quelle testate: aggiornale liberamente
# (arduino-cli lib search <nome> per vedere le versioni disponibili).
profiles:
  esp32:
    notes: WordClock ESP32 (WS2812B + RTC DS1307 + NTP)
    fqbn: esp32:esp32:esp32
    platforms:
      - platform: "esp32:esp32 (3.0.7)"
        platform_index_url: https://espressif.github.io/arduino-esp32/package_esp32_index.json
    libraries:
      - FastLED (3.7.0)
      - RTClib (2.1.4)
      - WiFiManager (2.0.17)

default_profile: esp32
